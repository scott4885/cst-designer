name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: file:./data/test.db

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: file:./data/test.db

      - run: npm run test -- --run
        env:
          DATABASE_URL: file:./data/test.db

      - run: npm run build

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: file:./data/test.db

      - run: npx playwright install --with-deps chromium

      - run: npx playwright test
        env:
          DATABASE_URL: file:./data/test.db

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # -------------------------------------------------------------------
  # DEPLOY (Fly.io) — disabled until iter 13.
  # Prerequisites before enabling:
  #   1. Run `fly launch` locally (creates fly.toml, app, and volume).
  #   2. Create a persistent volume for SQLite: `fly volumes create data --size 1`.
  #   3. Generate a deploy token: `fly tokens create deploy` and add it to
  #      GitHub Actions secrets as FLY_API_TOKEN.
